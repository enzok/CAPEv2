{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container my-4" style="max-width: 600px;">
    <h3 class="text-white mb-3"><i class="fas fa-trash-alt me-2 text-danger"></i>Remove Security Key</h3>
    
    <p class="text-light">
        {% blocktranslate %}Are you sure you want to remove this security key?{% endblocktranslate %}
    </p>
    
    {% url 'mfa_remove_webauthn' pk=authenticator.pk as action_url %}
    <form method="post" action="{{ action_url }}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash-alt me-1"></i> Remove</button>
        <a href="{% url 'mfa_list_webauthn' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
